<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gloomstep Dungeon</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #0a0a1a;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        font-family: monospace;
      }
      #game-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
      }
      h1 {
        color: #ffcc00;
        font-size: 24px;
        letter-spacing: 4px;
      }
      canvas {
        border: 2px solid #4a4a6a;
        image-rendering: pixelated;
      }
      .controls {
        color: #666;
        font-size: 11px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <h1>GLOOMSTEP DUNGEON</h1>
      <canvas id="game"></canvas>
      <div class="controls">
        WASD/Arrows: Move | G: Pickup | I: Inventory | >: Descend | .: Wait
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
